# .outbot.yml - Liqo Tinyland → GitHub Sync
project_name: liqo-github-sync
description: Sync Tinyland liqo main to GitHub Jesssullivan/liqo sid/outbot branch

source:
  platform: gitlab
  url: git@gitlab-personal:tinyland/liqo.git

# Source repository authentication (Tinyland GitLab)
gitlab:
  token_var: GITLAB_PERSONAL_PAT
  url: https://gitlab.com

# GitHub authentication for downstream
github:
  token_var: GITHUB_TOKEN
  api_url: https://api.github.com

# Downstream repository configuration
downstream:
  repositories:
    - https://github.com/Jesssullivan/liqo
  branch_mapping:
    main: sid/outbot  # Sync main (tinyland) → sid/outbot (github)

  # ============================================
  # Unified Strategy Configuration (NEW!)
  # ============================================
  # Single field that controls all sync behavior
  # Values: auto | mirror | zone-squash | privacy-incremental | full-squash
  # Phase 3+4 AI improvements enabled for all except 'mirror'
  strategy: "auto"

  # LEGACY (deprecated - handled by StrategyResolver):
  # push_strategy: merge  # Use strategy: auto instead
  # auto_strategy: true  # Use strategy: auto instead

  # ============================================
  # Privacy Protection Mode
  # ============================================
  # strict: Maximum privacy. Blocks old incremental, requires OutBot-managed commits
  # relaxed: Allows incremental but warns on detected leaks
  # none: No privacy protection
  privacy_mode: "strict"

  # ============================================
  # AI-Powered Commit Messages (5-Layer Fallback)
  # ============================================
  # Fallback chain: Duo → Multi-AI → Smart Summary → Forward → Canned
  commit_messages:
    # GitLab Duo AI (requires self-managed instance with feature flag)
    duo_commit_msg:
      enabled: true
      token_var: "GITLAB_PERSONAL_PAT"
      format: "conventional"
      max_message_length: 500

    # Multi-provider AI (fallback #2) - OpenAI, Anthropic, Ollama
    openai_commit_msg:
      enabled: false  # Enable if you have OpenAI API key
      api_key_var: "OPENAI_API_KEY"
      model: "gpt-4-turbo"
      temperature: 0.7
      max_tokens: 200

    anthropic_commit_msg:
      enabled: false  # Enable if you have Anthropic API key
      api_key_var: "ANTHROPIC_API_KEY"
      model: "claude-3-haiku-20240307"  # Fast and cheap
      temperature: 0.7
      max_tokens: 200

    ollama_commit_msg:
      enabled: false  # Enable for local FREE AI (requires ollama installed)
      endpoint: "http://localhost:11434"
      model: "codellama:7b"
      temperature: 0.7
      max_tokens: 200

    # Smart Summary (fallback #3) - FREE semantic analysis, no AI needed
    # Automatically enabled, no configuration needed

    # Forward upstream commit messages (fallback #4)
    forward_commit_msg:
      enabled: true
      mode: "latest"
      max_commits: 10
      truncate_at: 300

    # Canned messages (fallback #5, always succeeds)
    # Using conventional commit style for professional commit history
    canned_messages:
      enabled: true
      rotation_mode: "deterministic"
      messages:
        - "chore(sync): integrate upstream changes"
        - "chore(sync): merge upstream updates"
        - "chore(sync): pull latest from upstream"
        - "chore(sync): synchronize with upstream repository"
        - "feat(sync): incorporate upstream enhancements"
        - "fix(sync): apply upstream patches"
        - "refactor(sync): integrate upstream refactoring"
        - "build(sync): update from upstream build changes"
        - "ci(sync): synchronize CI/CD configurations"
        - "docs(sync): pull upstream documentation updates"
        - "style(sync): apply upstream formatting changes"
        - "perf(sync): integrate upstream performance improvements"
        - "test(sync): synchronize test suite from upstream"
        - "chore(deps): sync upstream dependency updates"
        - "chore(mirror): automated downstream synchronization"
      signature: "OutBot ∈ Tinyland ꒰ᐢ⸝⸝•༝•⸝⸝ᐢ꒱"

ignore_patterns:
  files:
    # Documentation
    - "*.md"
    - "*.rst"
    - "*.txt"
    - "*.adoc"
    # Temp and logs
    - "*.log"
    - "*.tmp"
    - "*.cache"
    - "*.bak"
    - "*.swp"
    - "*.orig"
    # Secrets
    - ".env"
    - ".env.*"
    - "*.secret"
    - "*.kdbx"
    - "*.key"
    - "*.pem"
    - "*secrets*.yml"
    - "credentials.json"
    - "tokens.json"
    # Build artifacts
    - "*.pyc"
    - "*.pyo"
    - "coverage.json"
    # macOS
    - ".DS_Store"
    - "._*"
  directories:
    # Python
    - "__pycache__"
    - "*.egg-info"
    - "*.dist-info"
    - ".pytest_cache"
    - ".mypy_cache"
    - ".ruff_cache"
    - ".venv"
    - "venv"
    - "dist"
    # Node
    - "node_modules"
    # Go
    - "vendor"
    # IDE
    - ".idea"
    - ".vscode"
    - ".cursor"
    # Claude/AI
    - ".claude"
    - ".claude-flow"
    - "memory"
    # Docs
    - "docs"
    - "documentation"

auto_strip_venvs: true
strip_venv_history: true
auto_approve_venv_strip: true

# ============================================
# Upstream Developer Privacy Protection
# ============================================
protect_upstreamers:
  enabled: true
  strip_authors: true
  # Authors to preserve (bots, CI, service accounts)
  preserve_authors:
    - outbot@automated.local
    - sync@outbot.local
    - dependabot[bot]@users.noreply.github.com
    - renovate[bot]@users.noreply.github.com
  # Replacement identity for stripped authors
  author_replacement:
    name: "OutBot Sync"
    email: "outbot@tinyland.org"
  # Clean AI-generated commit message patterns
  clean_ai_messages: true
  ai_patterns:
    - "Generated with \\[Claude Code\\].*"
    - "Co-Authored-By: Claude.*"
    - "Generated by GitHub Copilot"
    - "Co-Authored-By:.*Copilot.*"
  squash_mode: none

# ============================================
# Code Comment Stripping (DISABLED for Liqo)
# ============================================
# Liqo is a public open-source project, no need to strip comments
protect_comments:
  enabled: false

# ============================================
# Directory-Scoped Commits (Monorepo Support)
# ============================================
# Creates separate commits per zone instead of single squash.
# AI commit messages are generated per zone when enabled.
directory_zones:
  enabled: true
  source: "auto"  # auto | explicit | codeowners
  auto_zone_settings:
    group_root_files: true
    root_files_zone_name: "root"
    commit_prefix_template: "chore({zone})"
    exclude_zones:
      - ".git"
      - ".github"
      - ".gitlab"
      - "node_modules"
      - "__pycache__"
      - ".pytest_cache"
      - ".mypy_cache"
      - ".venv"
      - "venv"
      - "dist"
      - "build"
      - "vendor"
  skip_unchanged_zones: true
  generate_ai_message_per_zone: true  # Use AI for each zone commit (5-layer fallback)

# ============================================
# Commit Identity Configuration
# ============================================
outbot_as:
  # Default identity (generic bot for public GitHub sync)
  name: "Jess Sullivan"
  email: "jess@sulliwood.org"
  sign_off: true
  # Per-repository identity overrides (optional)
  overrides:
    - repository: "github.com/Jesssullivan/*"
      name: "Jess Sullivan"
      email: "jess@sulliwood.org"
