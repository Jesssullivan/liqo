# GitLab CI/CD for tinyland/liqo - Cilium LRP Support Branch
# Builds liqo-fabric container image with CiliumLocalRedirectPolicy support

# Include OutBot sync template for DRY sync jobs (Added 2025-12-19)
include:
  - remote: 'https://gitlab.com/tinyland/ai/outbot-ci/-/raw/main/templates/gitlab-ci/outbot-sync.yml'

stages:
  - build
  - push
  - sync  # Added for OutBot sync jobs

variables:
  REGISTRY: registry.gitlab.com
  IMAGE_NAME: $CI_PROJECT_PATH
  GO_VERSION: "1.24"

# Build fabric binary for amd64
build:fabric:amd64:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git make
  script:
    - mkdir -p bin/amd64
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/amd64/fabric_linux_amd64 ./cmd/fabric
  artifacts:
    paths:
      - bin/amd64/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
    - if: $CI_COMMIT_TAG

# Build fabric binary for arm64
build:fabric:arm64:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git make
  script:
    - mkdir -p bin/arm64
    - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/arm64/fabric_linux_arm64 ./cmd/fabric
  artifacts:
    paths:
      - bin/arm64/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
    - if: $CI_COMMIT_TAG

# Build and push multi-arch fabric image
push:fabric:
  stage: push
  image: docker:24-dind
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  needs:
    - build:fabric:amd64
    - build:fabric:arm64
  variables:
    # Disable TLS for DinD to work with buildx
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Install buildx and setup builder
    - docker buildx create --driver docker-container --use --name multiarch-builder --bootstrap
  script:
    # Determine image tag
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
      else
        IMAGE_TAG="${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
      fi
    - echo "Building image ${REGISTRY}/${IMAGE_NAME}/fabric:${IMAGE_TAG}"
    # Build and push multi-arch image
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg COMPONENT=fabric \
        -t ${REGISTRY}/${IMAGE_NAME}/fabric:${IMAGE_TAG} \
        -t ${REGISTRY}/${IMAGE_NAME}/fabric:latest \
        --push \
        -f build/liqo/Dockerfile \
        .
  rules:
    - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
    - if: $CI_COMMIT_TAG

# Also build liqo-controller-manager (needed for full installation)
build:controller-manager:amd64:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git make
  script:
    - mkdir -p bin/amd64
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/amd64/liqo-controller-manager_linux_amd64 ./cmd/liqo-controller-manager
  artifacts:
    paths:
      - bin/amd64/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
    - if: $CI_COMMIT_TAG

build:controller-manager:arm64:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git make
  script:
    - mkdir -p bin/arm64
    - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/arm64/liqo-controller-manager_linux_arm64 ./cmd/liqo-controller-manager
  artifacts:
    paths:
      - bin/arm64/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
    - if: $CI_COMMIT_TAG

push:controller-manager:
  stage: push
  image: docker:24-dind
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  needs:
    - build:controller-manager:amd64
    - build:controller-manager:arm64
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --driver docker-container --use --name multiarch-builder --bootstrap
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
      else
        IMAGE_TAG="${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
      fi
    - echo "Building image ${REGISTRY}/${IMAGE_NAME}/liqo-controller-manager:${IMAGE_TAG}"
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg COMPONENT=liqo-controller-manager \
        -t ${REGISTRY}/${IMAGE_NAME}/liqo-controller-manager:${IMAGE_TAG} \
        -t ${REGISTRY}/${IMAGE_NAME}/liqo-controller-manager:latest \
        --push \
        -f build/liqo/Dockerfile \
        .
  rules:
    - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
    - if: $CI_COMMIT_TAG

# ============================================
# OutBot Downstream Sync (Added 2025-12-19)
# ============================================

# Scheduled sync (runs every 15 min via GitLab Pipeline Schedule)
# CRITICAL: Must use docker tag to avoid shell executors (outbot not installed on host)
outbot:sync:scheduled:
  extends: .outbot:sync:scheduled
  stage: sync
  tags:
    - docker  # Force Docker executor - outbot runs in container

# Manual/push-triggered sync
outbot:sync:
  extends: .outbot:sync
  stage: sync
  tags:
    - docker  # Force Docker executor - outbot runs in container
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
      when: manual
