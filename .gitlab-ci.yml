stages:
- build
- push
- sync
variables:
  REGISTRY: registry.gitlab.com
  IMAGE_NAME: $CI_PROJECT_PATH
  GO_VERSION: '1.24'
build:fabric:amd64:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
  - apk add --no-cache git make
  script:
  - mkdir -p bin/amd64
  - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/amd64/fabric_linux_amd64
    ./cmd/fabric
  artifacts:
    paths:
    - bin/amd64/
    expire_in: 1 hour
  rules:
  - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
  - if: $CI_COMMIT_TAG
build:fabric:arm64:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
  - apk add --no-cache git make
  script:
  - mkdir -p bin/arm64
  - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/arm64/fabric_linux_arm64
    ./cmd/fabric
  artifacts:
    paths:
    - bin/arm64/
    expire_in: 1 hour
  rules:
  - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
  - if: $CI_COMMIT_TAG
push:fabric:
  stage: push
  image: docker:24-dind
  services:
  - name: docker:24-dind
    command:
    - --tls=false
  needs:
  - build:fabric:amd64
  - build:fabric:arm64
  variables:
    DOCKER_TLS_CERTDIR: ''
    DOCKER_HOST: tcp://docker:2375
    DOCKER_BUILDKIT: '1'
  before_script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker buildx create --driver docker-container --use --name multiarch-builder
    --bootstrap
  script:
  - "if [ -n \"$CI_COMMIT_TAG\" ]; then\n  IMAGE_TAG=\"$CI_COMMIT_TAG\"\nelse\n  IMAGE_TAG=\"\
    ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}\"\nfi\n"
  - echo "Building image ${REGISTRY}/${IMAGE_NAME}/fabric:${IMAGE_TAG}"
  - "docker buildx build \\\n  --platform linux/amd64,linux/arm64 \\\n  --build-arg\
    \ COMPONENT=fabric \\\n  -t ${REGISTRY}/${IMAGE_NAME}/fabric:${IMAGE_TAG} \\\n\
    \  -t ${REGISTRY}/${IMAGE_NAME}/fabric:latest \\\n  --push \\\n  -f build/liqo/Dockerfile\
    \ \\\n  .\n"
  rules:
  - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
  - if: $CI_COMMIT_TAG
build:controller-manager:amd64:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
  - apk add --no-cache git make
  script:
  - mkdir -p bin/amd64
  - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/amd64/liqo-controller-manager_linux_amd64
    ./cmd/liqo-controller-manager
  artifacts:
    paths:
    - bin/amd64/
    expire_in: 1 hour
  rules:
  - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
  - if: $CI_COMMIT_TAG
build:controller-manager:arm64:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
  - apk add --no-cache git make
  script:
  - mkdir -p bin/arm64
  - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/arm64/liqo-controller-manager_linux_arm64
    ./cmd/liqo-controller-manager
  artifacts:
    paths:
    - bin/arm64/
    expire_in: 1 hour
  rules:
  - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
  - if: $CI_COMMIT_TAG
push:controller-manager:
  stage: push
  image: docker:24-dind
  services:
  - name: docker:24-dind
    command:
    - --tls=false
  needs:
  - build:controller-manager:amd64
  - build:controller-manager:arm64
  variables:
    DOCKER_TLS_CERTDIR: ''
    DOCKER_HOST: tcp://docker:2375
    DOCKER_BUILDKIT: '1'
  before_script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker buildx create --driver docker-container --use --name multiarch-builder
    --bootstrap
  script:
  - "if [ -n \"$CI_COMMIT_TAG\" ]; then\n  IMAGE_TAG=\"$CI_COMMIT_TAG\"\nelse\n  IMAGE_TAG=\"\
    ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}\"\nfi\n"
  - echo "Building image ${REGISTRY}/${IMAGE_NAME}/liqo-controller-manager:${IMAGE_TAG}"
  - "docker buildx build \\\n  --platform linux/amd64,linux/arm64 \\\n  --build-arg\
    \ COMPONENT=liqo-controller-manager \\\n  -t ${REGISTRY}/${IMAGE_NAME}/liqo-controller-manager:${IMAGE_TAG}\
    \ \\\n  -t ${REGISTRY}/${IMAGE_NAME}/liqo-controller-manager:latest \\\n  --push\
    \ \\\n  -f build/liqo/Dockerfile \\\n  .\n"
  rules:
  - if: $CI_COMMIT_BRANCH == "sid/cilium-doks-rke-bridge"
  - if: $CI_COMMIT_TAG
